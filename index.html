<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Forge | Gamified Productivity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Focus Forge ⚒️</h1>
            <p>Focus for 25 minutes to mine resources and forge artifacts!</p>
        </header>

        <main>
            <div class="timer-section">
                <h2 id="timer">25:00</h2>
                <div class="controls">
                    <button id="start-btn">Start Mining</button>
                    <button id="reset-btn">Reset</button>
                </div>
            </div>

            <div class="inventory-section">
                <h3>Your Forge Inventory</h3>
                <p>Ores Mined: <span id="ore-count">0</span></p>
                <div class="artifacts" id="artifact-gallery">
                    </div>
            </div>
        </main>

        <footer>
            <p>Support the Forge: <a href="#">Buy me a coffee</a> | <a href="#">Best Focus Headphones (Affiliate)</a></p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
